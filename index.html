<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: radial-gradient(circle at top, #2b003f, #000);
    color: #fff;
    text-align: center;
}

/* Container */
.container {
    padding: 20px 14px;
}

/* Logo */
.logo {
    width: 150px;
    border-radius: 50%;
    box-shadow: 0 0 20px #00e6ff;
}

/* Title */
.title {
    margin-top: 12px;
    font-size: 18px;
    color: #00e6ff;
    font-weight: 600;
    line-height: 1.4;
}



/* Subtext */
.sub {
    font-size: 13px;
    color: #bbb;
    line-height: 1.5;
}

/* Divider */
.divider {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 18px 0;
}

.line {
    height: 2px;
    width: 50px;
    background: linear-gradient(to right, transparent, #00e6ff, transparent);
}

.divider span {
    margin: 0 8px;
    font-size: 13px;
    color: #00e6ff;
}

/* Card */
.card {
    background: rgba(20,20,40,0.85);
    padding: 16px;
    border-radius: 16px;
    text-align: left;
}

/* Items */
.item {
    margin: 10px 0;
    font-size: 13px;
    color: #ccc;
    line-height: 1.4;
}

.highlight {
    color: #00ffd5;
    font-weight: 600;
}

/* Button */
.btn {
    display: block;
    margin-top: 22px;
    padding: 16px;
    border-radius: 50px;
    font-size: 15px;
    color: #fff;
    text-decoration: none;
    background: linear-gradient(45deg, #ff0080, #7a00ff);
    box-shadow: 0 0 20px #ff00cc;
    font-weight: 600;
}

/* Sticky Button (mobile killer feature) */
.sticky-btn {
    position: fixed;
    bottom: 10px;
    left: 10px;
    right: 10px;
    padding: 14px;
    border-radius: 50px;
    background: linear-gradient(45deg, #ff0080, #7a00ff);
    text-align: center;
    font-weight: 600;
    box-shadow: 0 0 20px #ff00cc;
}

.sticky-btn a {
    color: white;
    text-decoration: none;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 12px;
    color: #aaa;
}

.footer a {
    color: #00ffd5;
    text-decoration: none;
}
</style>
